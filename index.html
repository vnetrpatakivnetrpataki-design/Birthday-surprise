<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Sravya</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Monoton&family=Secular+One&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: pink;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      font-family: 'Secular One', sans-serif;
      user-select: none;
    }

    /* heart background */
    .heart-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .heart {
      position: absolute;
      font-size: 1.5rem;
      color: #ff1493;
      opacity: 0.6;
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(5deg); }
      50% { transform: translateY(0) rotate(-5deg); }
      75% { transform: translateY(10px) rotate(5deg); }
    }

    /* buttons */
    .click-btn {
      position: absolute;
      background: #ff66cc;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 102, 204, 0.6);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }

    .click-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 20px rgba(255, 102, 204, 0.8);
    }

    /* message title */
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      font-family: 'Monoton', cursive;
      color: #ff1493;
      text-shadow: 0 0 10px #ff1493, 0 0 20px #ff66cc;
      white-space: nowrap;
      opacity: 0;
      z-index: 20;
      letter-spacing: 0.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flower {
      font-size: 3.5rem;
      color: #ff66cc;
      margin: 0 0.2rem;
      opacity: 0.8;
    }

    .title.show {
      opacity: 1;
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #ff1493; }
      100% { text-shadow: 0 0 25px #ff66cc, 0 0 40px #ff1493; }
    }

    /* handwritten message */
    .msg-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem;
      font-family: 'Monoton', cursive;
      color: #ff1493;
      text-shadow: 0 0 10px #ff66cc;
      opacity: 0;
      z-index: 20;
      text-align: center;
      padding: 1rem;
      max-width: 80%;
    }

    .msg-text.show {
      opacity: 1;
      animation: shine 2s ease-in-out infinite alternate;
    }

    @keyframes shine {
      0% { text-shadow: 0 0 10px #ff1493; }
      100% { text-shadow: 0 0 25px #ff66cc; }
    }

    /* bottom button */
    .bottom-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 30px;
      background: #ff1493;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-family: 'Monoton', cursive;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.7);
      cursor: pointer;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.5s, transform 0.3s;
    }

    .bottom-btn.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-btn:hover {
      transform: translateX(-50%) translateY(-5px) scale(1.05);
      box-shadow: 0 8px 20px rgba(255, 20, 147, 0.9);
    }

    /* speech bubble */
    .speech-bubble {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff99cc;
      color: #333;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 1rem;
      font-family: 'Monoton', cursive;
      box-shadow: 0 4px 8px rgba(255, 153, 204, 0.5);
      white-space: nowrap;
      opacity: 0;
      z-index: 31;
      text-shadow: 0 0 5px white;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #ff99cc;
    }

    .speech-bubble.show {
      opacity: 1;
    }

    /* hearts layer */
    .heart-layer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 25;
      visibility: hidden;
    }

    .heart-layer.show {
      visibility: visible;
    }

    .heart-layer-item {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      color: #ff1493;
      opacity: 0.8;
      animation: rise 6s linear forwards;
    }

    @keyframes rise {
      0% { transform: translateX(-50%) translateY(0); opacity: 0.8; }
      100% { transform: translateX(-50%) translateY(-120vh); opacity: 0; }
    }

    /* question box */
    .question-box {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff99cc;
      padding: 1.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255, 140, 190, 0.7);
      text-align: center;
      font-family: 'Monoton', cursive;
      font-size: 1.6rem;
      color: #d33;
      z-index: 40;
      opacity: 0;
      border: 2px dashed #ff1493;
    }

    .question-box.show {
      opacity: 1;
    }

    .option-btn {
      margin: 0.5rem;
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-size: 1.2rem;
      font-family: 'Monoton', cursive;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(255, 140, 190, 0.5);
    }

    .option-btn.yes {
      background: #33cc66;
      color: white;
    }

    .option-btn.no {
      background: #ff1493;
      color: white;
    }

    .no-btn {
      position: relative;
    }

    .msg-thank {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.2rem;
      font-family: 'Monoton', cursive;
      color: #ff1493;
      text-shadow: 0 0 10px #ff66cc;
      opacity: 0;
      z-index: 20;
      text-align: center;
    }

    .msg-thank.show {
      opacity: 1;
      animation: shine 2s ease-in-out infinite alternate;
    }

    /* not working text */
    .not-working {
      position: fixed;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      background: #ff3366;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 1.4rem;
      font-family: 'Monoton', cursive;
      opacity: 0;
      z-index: 50;
      box-shadow: 0 5px 15px rgba(255, 51, 102, 0.7);
    }

    .not-working.show {
      opacity: 1;
      animation: bounce 0.5s ease-in-out 0.5s forwards;
    }

    @keyframes bounce {
      0% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
      100% { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- background hearts -->
  <div class="heart-bg" id="heartBg"></div>

  <!-- 10 click me buttons -->
  <script>
    const btnCount = 10;
    for (let i = 0; i < btnCount; i++) {
      const btn = document.createElement('button');
      btn.classList.add('click-btn');
      btn.textContent = 'Click me';
      btn.id = `btn-${i}`;
      btn.style.left = `${Math.random() * 80 + 10}vw`;
      btn.style.top = `${Math.random() * 70 + 10}vh`;
      document.body.appendChild(btn);
    }

    const btns = document.querySelectorAll('.click-btn');
    const realBtn = btns[btns.length - 1];

    btns.forEach((btn, i) => {
      if (btn !== realBtn) {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          btn.style.transform = 'scale(0.95)';
          setTimeout(() => btn.style.transform = '', 150);
        });
      }
    });

    realBtn.addEventListener('click', () => {
      btns.forEach(btn => btn.style.opacity = '0');
      document.getElementById('title').style.opacity = '1';
      createTitleWithFlowers();
    });
  </script>

  <!-- title with flowers -->
  <div class="title" id="title"></div>

  <script>
    const titleEl = document.getElementById('title');

    function createTitleWithFlowers() {
      titleEl.innerHTML = '';
      const text = 'Happy birthday Sravya';
      const flowers = '🌸🌸🌸';

      for (let i = 0; i < text.length; i++) {
        const span = document.createElement('span');
        span.textContent = text[i];
        span.style.display = 'inline-block';
        titleEl.appendChild(span);

        if (i === Math.floor(text.length / 2)) {
          const flowerSpan = document.createElement('span');
          flowerSpan.classList.add('flower');
          flowerSpan.textContent = flowers;
          titleEl.appendChild(flowerSpan);
        }
      }
    }
  </script>

  <!-- message text -->
  <div class="msg-text" id="msgText">
    Wishing you a day filled with happiness and a year filled with joy. Happy birthday!
  </div>

  <!-- bottom button -->
  <button class="bottom-btn" id="bottomBtn">Click me</button>
  <div class="speech-bubble" id="speechBubble">* plz click me</div>

  <!-- hearts layer -->
  <div class="heart-layer" id="heartLayer">

      for (let i = 0; i < 40; i++) {

        item.classList.add('heart-layer-item');
        item.textContent = '❤️';
        item.style.left = `${Math.random() * 80 + 10}vw`;
        heartLayer.appendChild(item);
      }
    </script>
  </div>

  <!-- question box -->
  <div class="question-box" id="questionBox">
    Do u like it?
    <br>
    <button class="option-btn yes" id="yesBtn">Yes</button>
    <button class="option-btn no no-btn" id="noBtn">No</button>
  </div>

  <!-- thank you message -->
  <div class="msg-thank" id="thankMsg">thank you madam ji</div>

  <!-- not working text -->
  <div class="not-working" id="notWorking">oiiiii this button is not working</div>

  <!-- background music -->
  <audio id="bgMusic" loop>

  </audio>
