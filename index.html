<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sravya!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart {
            position: absolute;
            width: 20px;
            height: 18px;
            animation: float 6s linear infinite;
        }
        .heart:before,
        .heart:after {
            content: '';
            width: 10px;
            height: 16px;
            position: absolute;
            left: 10px;
            transform: rotate(-45deg);
            background: #ff69b4;
            border-radius: 10px 10px 0 0;
            transform-origin: 0 100%;
        }
        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        #game-buttons {
            position: relative;
            height: 100vh;
            z-index: 10;
        }
        .click-me-btn {
            position: absolute;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }
        .click-me-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .correct-btn {
            background: linear-gradient(45deg, #00ff88, #00cc6a) !important;
            animation: correctGlow 1s infinite alternate;
        }
        @keyframes correctGlow {
            from { box-shadow: 0 0 20px #00ff88; }
            to { box-shadow: 0 0 40px #00ff88, 0 0 60px #00ff88; }
        }
        #birthday-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.5em;
            font-weight: bold;
            color: #ff1493;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff;
            text-align: center;
            animation: handwriting 3s ease-out, bounceCelebrate 2s infinite 3s;
            z-index: 20;
            display: none;
            line-height: 1.2;
        }
        @keyframes handwriting {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1) rotate(2deg); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }
        @keyframes bounceCelebrate {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, -50%) translateY(0); }
            40% { transform: translate(-50%, -50%) translateY(-30px); }
            60% { transform: translate(-50%, -50%) translateY(-15px); }
        }
        .flower {
            display: inline-block;
            animation: flowerDance 3s infinite;
            margin: 0 10px;
        }
        @keyframes flowerDance {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(1.1); }
        }
        .next-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #ff1493;
            background: white;
            border: 5px solid #ff69b4;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,105,180,0.5);
            animation: wiggleBtn 2s infinite;
            z-index: 30;
            display: none;
        }
        @keyframes wiggleBtn {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(5deg); }
            75% { transform: translateX(-50%) rotate(-5deg); }
        }
        .speech-bubble {
            position: absolute;
            background: linear-gradient(45deg, #ffc0cb, #ff69b4);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255,105,180,0.5);
            animation: floatBubble 3s infinite;
            display: none;
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 30px;
            border: 10px solid transparent;
            border-top-color: #ff69b4;
        }
        @keyframes floatBubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        #wish-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 2px 2px 4px #ff4500;
            text-align: center;
            animation: celebrateShine 2s infinite;
            z-index: 25;
            display: none;
            line-height: 1.4;
            font-weight: bold;
        }
        @keyframes celebrateShine {
            0%, 100% { text-shadow: 2px 2px 4px #ff4500, 0 0 20px #ffd700; }
            50% { text-shadow: 2px 2px 4px #ff4500, 0 0 40px #ffd700, 0 0 60px #ff1493; }
        }
        #letter {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 30px;
            border: 3px dashed #ff69b4;
            border-radius: 20px;
            font-size: 24px;
            color: #ff1493;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: letterFall 2s ease-out forwards;
            cursor: pointer;
            z-index: 35;
            display: none;
        }
        @keyframes letterFall {
            to { top: 40%; }
        }
        .question-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 40;
            display: none;
        }
        .question-container h3 {
            color: #ff1493;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .yes-no-btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #yes-btn {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: white;
        }
        #no-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            position: relative;
        }
        #response {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            font-weight: bold;
            color: #ff1493;
            text-align: center;
            z-index: 45;
            display: none;
        }
        .hearts-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            overflow: hidden;
            z-index: 5;
            display: none;
        }
        .hearts-wave .heart {
            animation-duration: 4s !important;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="danceMonkey" loop>
        <!-- Add your Dance Monkey MP3 file here or use online URL (respect copyrights) -->
        <!-- <source src="dance-monkey.mp3" type="audio/mpeg"> -->
        <!-- For demo, no audio; upload your file and uncomment -->
    </audio>
    
    <div class="hearts-bg" id="heartsBg"></div>
    
    <div id="game-buttons">
        <!-- 10 Click Me buttons will be generated by JS -->
    </div>
    
    <div id="birthday-text">
        Happy Birthday <span class="flower" style="color:#ff69b4;">🌺</span> Sravya <span class="flower" style="color:#da70d6;">🌸</span><br>
        <span class="flower" style="color:#ff1493;">💐</span> <span class="flower" style="color:#32cd32;">🌺</span>
    </div>
    
    <button class="next-btn" id="next1" onclick="showWish()">plz click me</button>
    <div class="speech-bubble" id="bubble1">plz click me</div>
    
    <div id="wish-text">Wishing you a day filled with happiness and a year filled with joy. Happy birthday!</div>
    
    <button class="next-btn" id="next2" onclick="dropLetter()">plz click me one more time</button>
    <div class="speech-bubble" id="bubble2">plz click me one more time</div>
    
    <div id="letter" onclick="showQuestion()">Click to open!</div>
    
    <div class="question-container" id="question">
        <h3>Do u like it?</h3>
        <button class="yes-no-btn" id="yes-btn" onclick="showResponse('yes')">Yes</button>
        <button class="yes-no-btn" id="no-btn" onclick="showResponse('no')">No</button>
    </div>
    
    <div id="response"></div>
    
    <div class="hearts-wave" id="heartsWave"></div>

    <script>
        const audio = document.getElementById('danceMonkey');
        // audio.play().catch(e => console.log('Audio autoplay blocked'));

        // Generate continuous floating hearts background
        function createHeart(container) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 9000);
        }
        setInterval(() => createHeart(document.getElementById('heartsBg')), 300);

        // Create 10 random "Click Me" buttons, one correct
        const gameContainer = document.getElementById('game-buttons');
        const correctIndex = Math.floor(Math.random() * 10);
        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'click-me-btn';
            btn.textContent = 'Click Me!';
            btn.style.left = Math.random() * 80 + 5 + '%';
            btn.style.top = Math.random() * 80 + 5 + '%';
            btn.onclick = () => {
                if (i === correctIndex) {
                    gameContainer.style.display = 'none';
                    document.getElementById('birthday-text').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('next1').style.display = 'block';
                        document.getElementById('bubble1').style.display = 'block';
                        document.getElementById('bubble1').style.top = '85%';
                        document.getElementById('bubble1').style.left = '50%';
                        document.getElementById('bubble1').style.transform = 'translateX(-50%)';
                    }, 5000);
                }
            };
            if (i === correctIndex) btn.classList.add('correct-btn');
            gameContainer.appendChild(btn);
        }

        function showWish() {
            document.getElementById('next1').style.display = 'none';
            document.getElementById('bubble1').style.display = 'none';
            document.getElementById('birthday-text').style.display = 'none';
            // Hearts wave
            const wave = document.getElementById('heartsWave');
            wave.style.display = 'block';
            for (let i = 0; i < 100; i++) {
                setTimeout(() => createHeart(wave), i * 20);
            }
            setTimeout(() => {
                wave.style.display = 'none';
                document.getElementById('wish-text').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('next2').style.display = 'block';
                    document.getElementById('bubble2').style.top = '90%';
                    document.getElementById('bubble2').style.left = '50%';
                    document.getElementById('bubble2').style.transform = 'translateX(-50%)';
                    document.getElementById('bubble2').style.display = 'block';
                }, 5000);
            }, 4000);
        }

        function dropLetter() {
            document.getElementById('next2').style.display = 'none';
            document.getElementById('bubble2').style.display = 'none';
            document.getElementById('wish-text').style.display = 'none';
            document.getElementById('letter').style.display = 'block';
        }

        function showQuestion() {
            document.getElementById('letter').style.display = 'none';
            document.getElementById('question').style.display = 'block';
        }

        let noInterval;
        function showResponse(type) {
            document.getElementById('question').style.display = 'none';
            const response = document.getElementById('response');
            if (type === 'yes') {
                response.textContent = 'Thank you madam ji! ❤️';
                response.style.color = '#00ff88';
            } else {
                response.textContent = 'oiiiii this button is not working 😅';
                response.style.color = '#ff6b6b';
                // Make No button chase (but since clicked, just show message)
            }
            response.style.display = 'block';
            if (type === 'no') {
                // Simulate no button moving if needed, but response shown
            }
        }

        // Ensure no button stays in screen (handled in CSS position absolute with %)
    </script>
</body>
</html>
