<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
  overflow:hidden;
  background:linear-gradient(135deg,#ff9bb3,#ffc0cb);
}

/* SCENES */
.scene{
  position:absolute;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:opacity .6s ease;
}
.hidden{opacity:0;pointer-events:none}

/* CAT */
.cat{
  width:130px;
  animation:floatCat 3s ease-in-out infinite;
}
@keyframes floatCat{
  50%{transform:translateY(-15px)}
}

/* HEART BG */
.heart{
  position:absolute;
  width:10px;height:10px;
  background:#ff4d6d;
  transform:rotate(45deg);
}
.heart::before,.heart::after{
  content:"";
  position:absolute;
  width:10px;height:10px;
  background:#ff4d6d;
  border-radius:50%;
}
.heart::before{top:-5px}
.heart::after{left:-5px}

@keyframes rise{
  from{transform:translateY(100vh) rotate(45deg);opacity:1}
  to{transform:translateY(-10vh) rotate(45deg);opacity:0}
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:18px 50px;
  border:none;
  border-radius:40px;
  color:white;
  font-size:18px;
  cursor:pointer;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  box-shadow:0 0 20px rgba(255,0,80,.4);
}

/* CHARACTER */
.character{
  position:absolute;
  right:-200px;
  animation:enter 1.5s forwards;
}
@keyframes enter{
  to{right:50%;transform:translateX(50%)}
}
.speech{
  position:absolute;
  top:-60px;left:-140px;
  background:white;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

/* BOXES */
.box{
  padding:15px 25px;
  background:white;
  border:2px solid pink;
  margin:10px;
  cursor:pointer;
  transition:.2s;
}
.box:hover{transform:scale(1.1)}

/* DRAG */
.word{
  position:absolute;
  padding:10px 20px;
  background:white;
  border:2px solid pink;
  color:#ff4d6d;
  cursor:grab;
}
.slot{
  width:80px;height:50px;
  border:2px dashed white;
  margin:5px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FIREWORK */
.fire{
  position:absolute;
  width:4px;height:4px;
  background:white;
  border-radius:50%;
  animation:boom .9s ease-out forwards;
}
@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* FINAL TEXT */
.final h1{font-size:28px}
.final p{margin-top:10px}
</style>
</head>

<body>

<div id="scene1" class="scene">
  <img src="https://i.imgur.com/4AiXzf8.png" class="cat">
  <button class="btn" onclick="start()">can u touch me</button>
</div>

<div id="scene2" class="scene hidden"></div>
<div id="scene3" class="scene hidden"></div>
<div id="scene4" class="scene hidden"></div>
<div id="scene5" class="scene hidden"></div>

<script>

/* HEART LOOP (OPTIMIZED) */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  h.style.animation="rise 4s linear";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},300);

/* SCENE CONTROL */
function show(id){
  document.querySelectorAll(".scene").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* START */
function start(){
  show("scene2");
  let char=document.createElement("div");
  char.className="btn character";

  let speech=document.createElement("div");
  speech.className="speech";
  speech.innerText="oiii I want to tell u something";

  char.appendChild(speech);

  char.onclick=()=>{
    heartBurst();
    setTimeout(nextBoxes,500);
  };

  scene2.appendChild(char);
}

/* HEART BURST */
function heartBurst(){
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.style.left="50%";
    h.style.top="50%";
    h.style.setProperty("--x",(Math.random()*300-150)+"px");
    h.style.setProperty("--y",(Math.random()*300-150)+"px");
    h.style.animation="boom 1s forwards";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

/* BOX FLOW */
function nextBoxes(){
  show("scene3");

  let texts=[
    "I want to tell u something",
    "I'm really really serious ok na",
    "ok I'm ready to tell u..."
  ];

  let index=0;

  function render(){
    scene3.innerHTML="";
    texts.slice(index).forEach((t,i)=>{
      let b=document.createElement("div");
      b.className="box";

      b.onclick=()=>{
        b.remove();
        let msg=document.createElement("div");
        msg.innerText=t;
        scene3.appendChild(msg);

        setTimeout(()=>{
          index++;
          if(index===texts.length){
            dragGame();
          }else{
            render();
          }
        },2500);
      };

      scene3.appendChild(b);
    });
  }

  render();
}

/* DRAG GAME */
function dragGame(){
  show("scene4");
  scene4.innerHTML="<h2>Arrange the words</h2>";

  let words=["I","love","you","ji"];
  let order=["I","love","you","ji"];
  let slots=[];
  let placed=0;

  let slotBox=document.createElement("div");
  slotBox.style.display="flex";

  order.forEach((correct,i)=>{
    let s=document.createElement("div");
    s.className="slot";

    s.ondragover=e=>e.preventDefault();
    s.ondrop=e=>{
      let data=e.dataTransfer.getData("text");
      if(data===correct && !s.innerText){
        s.innerText=data;
        document.querySelector(`[data-word="${data}"]`).remove();
        placed++;
        if(placed===4) finalScene();
      }
    };

    slots.push(s);
    slotBox.appendChild(s);
  });

  scene4.appendChild(slotBox);

  words.forEach(w=>{
    let el=document.createElement("div");
    el.className="word";
    el.innerText=w;
    el.dataset.word=w;

    el.style.left=Math.random()*80+"vw";
    el.style.top=Math.random()*60+"vh";

    el.draggable=true;
    el.ondragstart=e=>{
      e.dataTransfer.setData("text",w);
    };

    document.body.appendChild(el);
  });
}

/* FIREWORKS */
function fireworks(){
  for(let i=0;i<120;i++){
    let f=document.createElement("div");
    f.className="fire";
    f.style.left="50%";
    f.style.top="50%";
    f.style.setProperty("--x",(Math.random()*500-250)+"px");
    f.style.setProperty("--y",(Math.random()*500-250)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),900);
  }
}

/* FINAL */
function finalScene(){
  show("scene5");
  scene5.innerHTML=`
    <div class="final">
      <h1>yes, I love u too madam</h1>
      <p>plz bless me to be with u 4eva</p>
      <br>
      <img src="https://i.imgur.com/4AiXzf8.png" class="cat">
      <img src="https://i.imgur.com/4AiXzf8.png" class="cat">
      <p>thank u kulli for coming in my life</p>
    </div>
  `;
  fireworks();
}

</script>

</body>
</html>
