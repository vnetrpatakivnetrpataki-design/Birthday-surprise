<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<style>
body{
  margin:0;
  height:100vh;
  background: linear-gradient(135deg,#ff5f6d,#ffc371);
  overflow:hidden;
  font-family:Arial;
  color:white;
  text-align:center;
  position:relative;
}

/* Buttons style */
button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  font-weight:bold;
  position:absolute;
}

#content, #birthdayParagraph, #questionSection{
  display:none;
}

/* Birthday text */
h1{
  font-size:45px;
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 10px white;}
  to{text-shadow:0 0 25px yellow;}
}

/* Cloud bubble */
.bubble{
  position:absolute;
  display:inline-block;
  background:#ff9aee;   /* pink bubble */
  color:#fff;            /* white text for contrast */
  font-weight:bold;
  font-size:22px;
  padding:10px 20px;
  border-radius:50%;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  text-align:center;
  animation: floatCloud 2s ease-in-out infinite alternate;
}

/* Floating cloud animation */
@keyframes floatCloud{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* Paragraph glow */
#birthdayParagraph{
  font-size:28px;
  font-weight:bold;
  animation: rainbowGlow 2s infinite alternate;
  margin:20px;
}
@keyframes rainbowGlow{
  0%{color:#ff4d6d;text-shadow:0 0 10px #ff4d6d;}
  25%{color:#ff9a9e;text-shadow:0 0 15px #ff9a9e;}
  50%{color:#fcd34d;text-shadow:0 0 20px #fcd34d;}
  75%{color:#4ade80;text-shadow:0 0 20px #4ade80;}
  100%{color:#60a5fa;text-shadow:0 0 20px #60a5fa;}
}

/* Question section */
#questionSection{
  position:fixed;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.9);
  color:#ff4d6d;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  transition: bottom 0.5s;
}
#questionSection.show{
  bottom:50px;
}

/* Reply text (Yes button) */
#reply{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
  color:#ff9aee;  /* pink */
  text-shadow:0 0 5px #ff9aee, 0 0 10px #ff9aee, 0 0 15px #ff9aee;  /* pink glow */
  animation: replyGlow 2s infinite alternate;
}
@keyframes replyGlow{
  0%{color:#ff9aee;text-shadow:0 0 5px #ff9aee;}
  50%{color:#ff4d6d;text-shadow:0 0 10px #ff9aee;}
  100%{color:#ff9aee;text-shadow:0 0 15px #ff4d6d;}
}

/* Props */
.prop{
  position:absolute;
  font-size:20px;
  pointer-events:none;
  user-select:none;
}
</style>
</head>
<body>

<!-- Scattered "Click Here" buttons -->
<div id="buttonsContainer"></div>

<!-- Birthday content -->
<div id="content">
  <h1>🎂 Happy Birthday Sravya 💖</h1>
  <div class="bubble" id="bubble" style="top:-50px; left:50%; transform:translateX(-50%);">Plz click me</div>
</div>

<div id="birthdayParagraph">
  Wishing you a day filled with happiness and a year filled with joy. Happy birthday!
</div>

<div id="questionSection">
  <h2>Do you like this surprise?</h2>
  <button onclick="yes()">Yes ❤️</button>
  <button id="noBtn">No 😅</button>
  <p id="reply"></p>
</div>

<!-- Music -->
<iframe width="0" height="0" src="https://www.youtube.com/embed/q0hyYWKXF0Q?autoplay=1&mute=0&loop=1&playlist=q0hyYWKXF0Q" frameborder="0" allow="autoplay"></iframe>

<script>
// ---------- 1️⃣ Generate 10 scattered "Click Here" buttons ----------
function scatterButtons(){
  const container = document.getElementById("buttonsContainer");
  container.innerHTML="";
  container.style.display="block";

  const realIndex = Math.floor(Math.random()*10); // only one real button

  for(let i=0;i<10;i++){
    let btn = document.createElement("button");
    btn.innerText="Click Here";
    btn.style.top=Math.random()*80 + 10 + "vh";
    btn.style.left=Math.random()*80 + 10 + "vw";

    if(i===realIndex){
      btn.onclick = () => {
        container.style.display="none";
        showBirthday();
      };
    } else {
      btn.onclick = () => {
        btn.innerText="😅 Not me!";
        btn.style.background="#ff4d6d";
        btn.style.color="#fff";
      };
    }
    container.appendChild(btn);
  }
}

// ---------- 2️⃣ Show Birthday content ----------
function showBirthday(){
  document.getElementById("content").style.display="block";

  // Bubble click → show paragraph
  document.getElementById("bubble").onclick = showParagraph;

  startProps(); // background animation
}

// ---------- 3️⃣ Show Paragraph ----------
function showParagraph(){
  document.getElementById("bubble").style.display="none";
  document.getElementById("birthdayParagraph").style.display="block";

  setTimeout(()=>{
    document.getElementById("birthdayParagraph").style.display="none";
    document.getElementById("bubble").style.display="block";
    document.getElementById("bubble").innerText="Plz click me one more time";
    document.getElementById("bubble").onclick = showQuestion;
  },5000);
}

// ---------- 4️⃣ Show Question ----------
function showQuestion(){
  document.getElementById("bubble").style.display="none";
  const question = document.getElementById("questionSection");
  question.style.display="block";
  setTimeout(()=>{ question.classList.add("show"); },50);
}

// ---------- 5️⃣ Yes / No ----------
function yes(){ document.getElementById("reply").innerHTML="I'm really happy you liked it 😊💖"; }
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
  const x=Math.random()*80;
  const y=Math.random()*60+20;
  noBtn.style.left=x+"vw";
  noBtn.style.top=y+"vh";
  noBtn.style.position="absolute";
});
noBtn.addEventListener("click",()=>{ document.getElementById("reply").innerHTML="This button is not working 😅"; });

function startProps(){
  const body = document.body;
  setInterval(()=>{
