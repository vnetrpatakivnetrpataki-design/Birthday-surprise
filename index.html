<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sravya!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Brush Script MT', cursive, 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            position: relative;
            cursor: pointer;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart {
            position: absolute;
            width: 20px;
            height: 18px;
            color: #ff69b4;
            animation: float 6s linear infinite;
            font-size: 20px;
        }
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        .stage {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .buttons-stage {
            width: 100%;
            height: 100vh;
        }
        .click-me-btn {
            position: absolute;
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,20,147,0.5);
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .click-me-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255,20,147,0.7);
        }
        .click-me-btn:active {
            transform: scale(0.95);
        }
        .birthday-text {
            font-size: 4.5em;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin: 0;
            animation: handwriting 3s ease-out, glow 2s ease-in-out infinite alternate;
            display: none;
            position: relative;
        }
        @keyframes handwriting {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            50% { opacity: 0.5; transform: scale(1.1) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #fff, 0 0 30px #ff69b4, 0 0 40px #ff69b4; }
            to { text-shadow: 0 0 30px #fff, 0 0 40px #ff1493, 0 0 50px #ff1493; }
        }
        .flower {
            display: inline-block;
            animation: petalFloat 3s ease-in-out infinite;
            margin: 0 10px;
        }
        @keyframes petalFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }
        .next-btn {
            position: absolute;
            bottom: 10%;
            background: linear-gradient(45deg, #32cd32, #00ff7f);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,255,127,0.5);
            display: none;
            z-index: 20;
        }
        .next-btn:hover {
            transform: scale(1.05);
        }
        .speech-bubble {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffc0cb, #ff69b4);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(255,192,203,0.5);
            animation: bubbleFloat 2s ease-in-out infinite;
        }
        @keyframes bubbleFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: #ff69b4;
        }
        .message {
            font-size: 2.5em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 50px 0;
            animation: celebrate 2s ease-in-out infinite;
            display: none;
            line-height: 1.4;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(1.05) rotate(-2deg); }
        }
        .letter {
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            font-size: 24px;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            animation: fallDown 2s ease-out;
            display: none;
            z-index: 30;
            border: 5px solid #ff69b4;
        }
        @keyframes fallDown {
            0% { top: -200px; transform: translateX(-50%) rotate(0deg); }
            100% { top: 50%; transform: translateX(-50%) rotate(5deg); }
        }
        .question-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 40;
            flex-direction: column;
        }
        .question {
            font-size: 2em;
            color: #ff1493;
            margin-bottom: 40px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .yes-no-btn {
            padding: 15px 40px;
            margin: 0 20px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .yes-btn {
            background: linear-gradient(45deg, #32cd32, #00ff00);
            color: white;
        }
        .no-btn {
            background: linear-gradient(45deg, #ff4500, #ff6347);
            color: white;
            position: absolute;
            animation: moveRandom 3s infinite;
        }
        @keyframes moveRandom {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, -30px); }
            50% { transform: translate(-40px, 20px); }
            75% { transform: translate(30px, -20px); }
        }
        .response {
            font-size: 2em;
            color: #ff1493;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            animation: bounceIn 1s ease-out;
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            60% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .thick-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            display: none;
        }
        .thick-heart {
            position: absolute;
            font-size: 30px;
            color: #ff69b4;
            animation: thickFloat 4s linear forwards;
        }
        @keyframes thickFloat {
            0% {
                bottom: -50px;
                opacity: 1;
            }
            100% {
                top: -50px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <audio id="music" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
        <!-- Note: Replace with actual Dance Monkey URL or local file. For demo, using placeholder. Browsers require user interaction to play. -->
    </audio>

    <div class="hearts-bg" id="heartsBg"></div>
    <div class="thick-hearts" id="thickHearts"></div>

    <div class="stage" id="stage">
        <div class="buttons-stage" id="buttonsStage"></div>
        
        <h1 class="birthday-text" id="birthdayText">
            Happy Birthday <span class="flower">🌸</span> Sravya <span class="flower">🌺</span> !
        </h1>
        
        <div class="message" id="wishMessage">
            Wishing you a day filled with happiness and a year filled with joy. Happy birthday!
        </div>
        
        <button class="next-btn" id="nextBtn1">
            <div class="speech-bubble">Plz click me</div>
        </button>
        
        <button class="next-btn" id="nextBtn2" style="background: linear-gradient(45deg, #ffd700, #ff8c00);">
            <div class="speech-bubble">Plz click me one more time</div>
        </button>
        
        <div class="letter" id="letter">Click to open!</div>
        
        <div class="question-stage" id="questionStage">
            <div class="question">Do u like it?</div>
            <button class="yes-no-btn yes-btn" id="yesBtn">Yes</button>
            <button class="yes-no-btn no-btn" id="noBtn">No</button>
            <div class="response" id="yesResponse">Thank you madam ji! 🎉</div>
            <div class="response" id="noResponse">Oiiiii this button is not working 😅</div>
        </div>
    </div>

    <script>
        let correctBtnIndex = Math.floor(Math.random() * 10);
        let gameStage = 0; // 0: buttons, 1: birthday, 2: wish, 3: letter/question

        // Continuous floating hearts background
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.getElementById('heartsBg').appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createFloatingHeart, 300);

        // Initial 10 buttons
        function initButtons() {
            const container = document.getElementById('buttonsStage');
            for (let i = 0; i < 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'click-me-btn';
                btn.textContent = 'Click Me!';
                btn.style.left = Math.random() * 80 + 5 + '%';
                btn.style.top = Math.random() * 80 + 5 + '%';
                btn.onclick = () => {
                    if (i === correctBtnIndex) {
                        container.style.display = 'none';
                        document.getElementById('birthdayText').style.display = 'block';
                        document.body.style.cursor = 'default';
                        setTimeout(() => {
                            document.getElementById('nextBtn1').style.display = 'block';
                        }, 5000);
                        gameStage = 1;
                    }
                };
                container.appendChild(btn);
            }
        }

        // Next button 1
        document.getElementById('nextBtn1').onclick = () => {
            document.getElementById('birthdayText').style.display = 'none';
            document.getElementById('nextBtn1').style.display = 'none';
            document.getElementById('wishMessage').style.display = 'block';
            thickHeartsBurst();
            setTimeout(() => {
                document.getElementById('nextBtn2').style.display = 'block';
            }, 5000);
            gameStage = 2;
        };

        // Thick hearts burst
        function thickHeartsBurst() {
            const container = document.getElementById('thickHearts');
            container.style.display = 'block';
            for (let i = 0; i < 100; i++) {
                const heart = document.createElement('div');
                heart.className = 'thick-heart';
                heart.innerHTML = '💖';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 0.5 + 's';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }
            setTimeout(() => container.style.display = 'none', 5000);
        }

        // Next button 2
        document.getElementById('nextBtn2').onclick = () => {
            document.getElementById('wishMessage').style.display = 'none';
            document.getElementById('nextBtn2').style.display = 'none';
            document.getElementById('letter').style.display = 'block';
            gameStage = 3;
        };

        // Letter click
        document.getElementById('letter').onclick = () => {
            document.getElementById('letter').style.display = 'none';
            document.getElementById('questionStage').style.display = 'flex';
        };

        // Yes button
        document.getElementById('yesBtn').onclick = () => {
            document.getElementById('questionStage').style.display = 'none';
            document.getElementById('yesResponse').style.display = 'block';
            setTimeout(() => {
                document.getElementById('yesResponse').style.display = 'none';
                // Restart or end
            }, 3000);
        };

        // No button - moves randomly but stays in screen
        document.getElementById('noBtn').onclick = () => {
            document.getElementById('questionStage').style.display = 'none';
            document.getElementById('noResponse').style.display = 'block';
            setTimeout(() => {
                document.getElementById('noResponse').style.display = 'none';
            }, 4000);
        };

        // Music (play on first interaction)
        let musicPlayed = false;
        document.addEventListener('click', () => {
            if (!musicPlayed) {
                const music = document.getElementById('music');
                music.play().catch(e => console.log('Music autoplay blocked'));
                musicPlayed = true;
            }
        }, { once: true });

        // Init
        initButtons();
    </script>
</body>
</html>
