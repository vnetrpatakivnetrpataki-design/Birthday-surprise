<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background: linear-gradient(135deg,#ff5f6d,#ffc371);
  overflow:hidden;
  color:white;
  text-align:center;
  position:relative;
}

/* Buttons */
button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  margin:10px;
  font-weight:bold;
  position:relative;
}

#content, #questionSection, #birthdayParagraph{
  display:none;
}

/* Birthday text */
h1{
  font-size:45px;
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 10px white;}
  to{text-shadow:0 0 25px yellow;}
}

/* Cloud bubble above small button */
.bubble{
  position:absolute;
  display:inline-block;
  background:#fff;
  color:#ff4d6d;
  font-weight:bold;
  font-size:22px;
  padding:10px 20px;
  border-radius:50% 50% 50% 50%;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  text-align:center;
  animation: floatCloud 2s ease-in-out infinite alternate;
}
@keyframes floatCloud{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0px);}
}

/* Question section slide-up */
#questionSection{
  position:fixed;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.9);
  color:#ff4d6d;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  transition: bottom 0.5s;
}
#questionSection.show{
  bottom:50px;
}

/* Glowing paragraph */
#birthdayParagraph{
  font-size:28px;
  font-weight:bold;
  animation: rainbowGlow 2s infinite alternate;
  margin:20px;
}
@keyframes rainbowGlow{
  0%{color:#ff4d6d;text-shadow:0 0 10px #ff4d6d;}
  25%{color:#ff9a9e;text-shadow:0 0 15px #ff9a9e;}
  50%{color:#fcd34d;text-shadow:0 0 20px #fcd34d;}
  75%{color:#4ade80;text-shadow:0 0 20px #4ade80;}
  100%{color:#60a5fa;text-shadow:0 0 20px #60a5fa;}
}

/* Reply text */
#reply{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
  color:#ffea00;
  text-shadow:0 0 5px #ff4d6d, 0 0 10px #ff9a9e, 0 0 15px #fcd34d;
  animation: replyGlow 2s infinite alternate;
}
@keyframes replyGlow{
  0%{color:#ffea00;text-shadow:0 0 5px #ff4d6d;}
  50%{color:#60a5fa;text-shadow:0 0 10px #4ade80;}
  100%{color:#fcd34d;text-shadow:0 0 15px #ff9a9e;}
}

/* Props */
.prop{
  position:absolute;
  font-size:20px;
  pointer-events:none;
  user-select:none;
}
</style>
</head>
<body>

<button id="clickBtn" onclick="showBirthday()">Click Here 🎁</button>

<div id="content">
  <h1>🎂 Happy Birthday Sravya 💖</h1>
  <div class="bubble" style="top:-50px; left:50%; transform:translateX(-50%);"></div>
  <button id="bubbleBtn" onclick="showParagraph()" style="margin-top:200px;">Click Me</button>
</div>

<div id="birthdayParagraph">
  Wishing you a day filled with happiness and a year filled with joy. Happy birthday!
</div>

<div id="questionSection">
  <h2>Do you like this surprise?</h2>
  <button onclick="yes()">Yes ❤️</button>
  <button id="noBtn">No 😅</button>
  <p id="reply"></p>
</div>

<!-- Music -->
<iframe width="0" height="0" src="https://www.youtube.com/embed/q0hyYWKXF0Q?autoplay=1&mute=0&loop=1&playlist=q0hyYWKXF0Q" frameborder="0" allow="autoplay; encrypted-media"></iframe>

<script>
// Initial birthday screen
function showBirthday(){
  document.getElementById("clickBtn").style.display="none";
  document.getElementById("content").style.display="block";

  // Start props animation
  startProps();
}

// Show rainbow paragraph
function showParagraph(){
  document.getElementById("birthdayParagraph").style.display="block";
  document.getElementById("bubbleBtn").style.display="none";

  setTimeout(()=>{
    document.getElementById("bubbleBtn").style.display="inline-block";
    document.querySelector(".bubble").innerText="Plz click me one more time";
  },5000);
}

// Show question
document.getElementById("bubbleBtn").addEventListener("click", function(){
  let question = document.getElementById("questionSection");
  question.style.display="block";
  setTimeout(()=>{ question.classList.add("show"); },50);
});

// Yes / No buttons
function yes(){
  document.getElementById("reply").innerHTML="I'm really happy you liked it 😊💖";
}

// No button moves randomly inside screen only
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  const x = Math.random()*80;
  const y = Math.random()*60 + 20;
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "vw";
  noBtn.style.top = y + "vh";
});
noBtn.addEventListener("click", () => {
  document.getElementById("reply").innerHTML="This button is not working 😅";
});

// ---------- RANDOM MOVING PROPS ----------
function startProps(){
  const body = document.body;

  setInterval(()=>{
    // Hearts ❤️
    let heart = document.createElement("div");
    heart.className="prop";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top=Math.random()*100+"vh";
    heart.style.fontSize=(15+Math.random()*20)+"px";
    heart.style.color=["#ff4d6d","#ff9a9e","#ffc371","#fcd34d","#4ade80","#60a5fa"][Math.floor(Math.random()*6)];
    body.appendChild(heart);
    animateProp(heart);
  },300);

  setInterval(()=>{
    // Confetti 🎊
    let conf = document.createElement("div");
    conf.className="prop";
    conf.innerHTML="🎊";
    conf.style.left=Math.random()*100+"vw";
    conf.style.top=Math.random()*100+"vh";
    conf.style.fontSize=(15+Math.random()*15)+"px";
    body.appendChild(conf);
    animateProp(conf);
  },500);

  setInterval(()=>{
    // Fireworks 🎆
    let fire = document.createElement("div");
    fire.className="prop";
    fire.innerHTML="🎆";
    fire.style.left=Math.random()*100+"vw";
    fire.style.top=Math.random()*100+"vh";
    fire.style.fontSize=(20+Math.random()*20)+"px";
    body.appendChild(fire);
    animateProp(fire);
  },1000);
}

// Move props randomly
function animateProp(el){
  let xMove = (Math.random()-0.5)*2;
  let yMove = (Math.random()-0.5)*2;
  let anim = setInterval(()=>{
    let xPos = parseFloat(el.style.left) + xMove;
    let yPos = parseFloat(el.style.top) + yMove;
    el.style.left = xPos + "vw";
    el.style.top = yPos + "vh";

    if(xPos < -10 || xPos > 100 || yPos < -10 || yPos > 100){
      el.remove();
      clearInterval(anim);
    }
  },20);
}
</script>
</body>
</html>
