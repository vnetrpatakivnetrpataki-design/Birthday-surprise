<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<style>
body{
  margin:0;
  height:100vh;
  background: linear-gradient(135deg,#ff5f6d,#ffc371);
  overflow:hidden;
  font-family:Arial;
  color:white;
  text-align:center;
  position:relative;
}

/* Buttons style */
button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  font-weight:bold;
  position:absolute;
}

#content, #birthdayParagraph, #questionSection{
  display:none;
}

/* Birthday text */
h1{
  font-size:45px;
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 10px white;}
  to{text-shadow:0 0 25px yellow;}
}

/* Cloud bubble */
.bubble{
  position:absolute;
  display:inline-block;
  background:#ff9aee;   /* pink bubble */
  color:#fff;            /* white text */
  font-weight:bold;
  font-size:22px;
  padding:10px 20px;
  border-radius:50%;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  text-align:center;
  animation: floatCloud 2s ease-in-out infinite alternate;
}
@keyframes floatCloud{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* Paragraph glow */
#birthdayParagraph{
  font-size:28px;
  font-weight:bold;
  animation: rainbowGlow 2s infinite alternate;
  margin:20px;
}
@keyframes rainbowGlow{
  0%{color:#ff4d6d;text-shadow:0 0 10px #ff4d6d;}
  25%{color:#ff9a9e;text-shadow:0 0 15px #ff9a9e;}
  50%{color:#fcd34d;text-shadow:0 0 20px #fcd34d;}
  75%{color:#4ade80;text-shadow:0 0 20px #4ade80;}
  100%{color:#60a5fa;text-shadow:0 0 20px #60a5fa;}
}

/* Question section */
#questionSection{
  position:fixed;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.9);
