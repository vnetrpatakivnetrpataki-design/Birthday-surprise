<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sravya!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive;
            overflow: hidden;
            height: 100vh;
            position: relative;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart {
            position: absolute;
            width: 20px;
            height: 18px;
            color: #ff69b4;
            animation: float 6s linear infinite;
            font-size: 20px;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .stage {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .buttons-stage {
            width: 100%;
            height: 100vh;
        }
        .click-me-btn {
            position: absolute;
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,20,147,0.4);
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .click-me-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(255,20,147,0.6);
        }
        .click-me-btn:active {
            transform: scale(0.95);
        }
        .happy-birthday {
            display: none;
            font-size: 4em;
            color: #ff1493;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            animation: handwriting 3s ease-out, glow 2s ease-in-out infinite alternate;
            position: relative;
        }
        @keyframes handwriting {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #ff1493; }
            to { text-shadow: 0 0 30px #ff1493, 0 0 40px #ff69b4; }
        }
        .flower { color: #ffd700; font-weight: bold; margin: 0 10px; animation: wiggle 1s infinite; }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        .next-btn {
            background: linear-gradient(45deg, #32cd32, #90ee90);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(50,205,50,0.4);
            position: absolute;
            bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .speech-bubble {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ffc0cb, #ff69b4);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255,192,203,0.5);
            white-space: nowrap;
            animation: bounce 1s infinite;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: #ff69b4;
        }
        .letter {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 3px dashed #ff1493;
            padding: 30px;
            font-size: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            animation: fallLetter 2s ease-out;
            z-index: 20;
        }
        @keyframes fallLetter {
            0% { top: -100px; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 40%; }
        }
        .question {
            display: none;
            font-size: 2em;
            color: #ff1493;
            margin: 20px 0;
        }
        .yes-no-btn {
            background: linear-gradient(45deg, #32cd32, #90ee90);
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(50,205,50,0.4);
        }
        .no-btn {
            background: linear-gradient(45deg, #ff4500, #ff6347);
            animation: moveRandom 3s infinite;
        }
        @keyframes moveRandom {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, -30px); }
            50% { transform: translate(-40px, 20px); }
            75% { transform: translate(30px, -20px); }
        }
        .message {
            display: none;
            font-size: 2em;
            color: #ff1493;
            padding: 20px;
            animation: handwriting 2s ease-out;
        }
        .hearts-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .heart-thick {
            position: absolute;
            font-size: 30px;
            color: #ff69b4;
            animation: thickRise 4s linear forwards;
        }
        @keyframes thickRise {
            0% { bottom: 0; opacity: 1; transform: scale(1); }
            100% { bottom: 100vh; opacity: 0; transform: scale(1.5) rotate(360deg); }
        }
        audio { display: none; }
    </style>
</head>
<body>
    <audio id="music" loop>
        <!-- Replace with direct Dance Monkey MP3 URL, e.g., from free sources or upload your own -->
        <!-- For demo, add your file: <source src="dance-monkey.mp3" type="audio/mpeg"> -->
        Your browser does not support the audio element.
    </audio>
    
    <div class="heart-bg" id="heartBg"></div>
    <div class="hearts-wave" id="heartsWave"></div>
    
    <div class="stage" id="stage">
        <div class="buttons-stage" id="buttonsStage"></div>
        
        <div class="happy-birthday" id="happyBirthday">
            <span class="flower">🌸</span>Happy Birthday Sravya<span class="flower">🌺</span>
        </div>
        
        <button class="next-btn" id="nextBtn" style="display:none;">
            <div class="speech-bubble" id="speech1">Plz click me</div>
            Next
        </button>
        
        <div class="letter" id="letter" style="display:none;" onclick="openQuestion()">
            Click to open!
        </div>
        
        <div id="questionSection" style="display:none;">
            <div class="question">Do u like it?</div>
            <button class="yes-no-btn" onclick="likeYes()">Yes</button>
            <button class="yes-no-btn no-btn" id="noBtn" onclick="likeNo()">No</button>
        </div>
    </div>

    <script>
        let correctBtnIndex = Math.floor(Math.random() * 10);
        const music = document.getElementById('music');
        
        // Background hearts
        function createBgHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.getElementById('heartBg').appendChild(heart);
            setTimeout(() => heart.remove(), 9000);
        }
        setInterval(createBgHeart, 300);
        
        // Initial 10 buttons
        function createButtons() {
            const stage = document.getElementById('buttonsStage');
            for (let i = 0; i < 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'click-me-btn';
                btn.textContent = 'Click Me!';
                btn.style.left = Math.random() * 80 + 10 + 'vw';
                btn.style.top = Math.random() * 80 + 10 + 'vh';
                btn.onclick = () => {
                    if (i === correctBtnIndex) {
                        stage.style.display = 'none';
                        document.getElementById('happyBirthday').style.display = 'block';
                        document.getElementById('nextBtn').style.display = 'block';
                        music.play().catch(() => {}); // Autoplay may need user gesture
                        setTimeout(() => {
                            createThickHearts();
                        }, 5000);
                    }
                };
                stage.appendChild(btn);
            }
        }
        
        // Next button
        document.getElementById('nextBtn').onclick = () => {
            document.getElementById('happyBirthday').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('letter').style.display = 'block';
            setTimeout(() => {
                const nextSpeechBtn = document.createElement('button');
                nextSpeechBtn.className = 'next-btn';
                nextSpeechBtn.style.bottom = '10px';
                nextSpeechBtn.innerHTML = '<div class="speech-bubble">Plz click me one more time</div>Next';
                nextSpeechBtn.onclick = () => {
                    nextSpeechBtn.remove();
                    document.getElementById('letter').style.display = 'block';
                };
                document.body.appendChild(nextSpeechBtn);
            }, 5000);
        };
        
        function openQuestion() {
            document.getElementById('letter').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
        }
        
        function likeYes() {
            document.getElementById('questionSection').innerHTML = '<div class="message">Thank you madam ji! 💖</div>';
        }
        
        function likeNo() {
            document.getElementById('questionSection').innerHTML = '<div class="message">Oiiiii this button is not working 😅</div>';
        }
        
        function createThickHearts() {
            const wave = document.getElementById('heartsWave');
            for (let i = 0; i < 100; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-thick';
                heart.innerHTML = '💖';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = (i * 0.03) + 's';
                wave.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }
        }
        
        // Start
        createButtons();
    </script>
</body>
</html>
