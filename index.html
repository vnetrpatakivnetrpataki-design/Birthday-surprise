<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sravya!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff69b4, #ff1493, #da70d6, #dda0dd, #ffb6c1);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hidden { display: none !important; }
        .stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; text-align: center; }

        /* Buttons stage */
        .btn { 
            position: fixed;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,105,180,0.5);
            animation: pulse 2s infinite;
            z-index: 10;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,105,180,0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,105,180,0.8); }
            100% { transform: scale(1); }
        }
        .btn:hover { transform: scale(1.1); }

        /* Birthday message */
        .birthday {
            font-size: 5em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px #ff69b4;
            animation: glow 2s ease-in-out infinite alternate, bounce 3s infinite;
            position: relative;
            margin-top: 20vh;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #fff, 0 0 30px #ff1493; }
            to { text-shadow: 0 0 30px #fff, 0 0 40px #ff69b4, 0 0 50px #ff1493; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        .flower {
            display: inline-block;
            font-size: 0.6em;
            animation: petalFloat 4s infinite;
            margin: 0 10px;
        }
        @keyframes petalFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Next buttons with speech bubble */
        .next-btn {
            position: fixed;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(255,20,147,0.6);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-20px); }
        }
        .speech-bubble {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ffc0cb, #ffb6c1);
            color: #ff1493;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 10px 20px rgba(255,192,203,0.5);
            animation: wiggle 2s infinite;
            margin-bottom: 10px;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: #ffc0cb;
        }
        @keyframes wiggle {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(5deg); }
            75% { transform: translateX(-50%) rotate(-5deg); }
        }

        /* Wish message */
        .wish {
            font-size: 2.5em;
            line-height: 1.4;
            color: #ffff00;
            text-shadow: 0 0 40px #ff69b4;
            animation: celebrate 1s ease-in-out infinite;
            margin: 20vh auto;
            max-width: 90%;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Letter */
        .letter {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: linear-gradient(45deg, #fff, #ffe4e1);
            border: 5px solid #ff69b4;
            border-radius: 20px;
            animation: fallLetter 3s ease-out forwards;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ff1493;
            font-weight: bold;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        @keyframes fallLetter {
            to { top: 30vh; }
        }

        /* Question */
        .question {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
            color: #ff1493;
            font-size: 28px;
            font-weight: bold;
        }
        .yes-no-btn {
            margin: 20px;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .yes { background: #4ecdc4; color: white; }
        .no { 
            background: #ff6b6b; 
            color: white; 
            position: fixed;
            animation: chase 5s infinite linear;
        }
        @keyframes chase {
            0% { left: 10%; top: 20%; }
            25% { left: 70%; top: 10%; }
            50% { left: 20%; top: 70%; }
            75% { left: 80%; top: 50%; }
            100% { left: 10%; top: 20%; }
        }
        .response {
            font-size: 3em;
            color: #ffff00;
            text-shadow: 0 0 30px #ff1493;
            animation: bounce 2s infinite;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <!-- Stage 1: 10 random buttons -->
    <div id="buttonsStage" class="stage">
        <!-- Buttons added by JS -->
    </div>

    <!-- Stage 2: Happy Birthday -->
    <div id="birthdayStage" class="stage hidden">
        <div class="birthday">
            Happy Birthday <span class="flower">🌸</span> Sravya <span class="flower">🌺</span> 🌸
        </div>
        <button id="next1" class="next-btn hidden">
            <div class="speech-bubble">plz click me</div>
        </button>
    </div>

    <!-- Stage 3: Wish -->
    <div id="wishStage" class="stage hidden">
        <div class="wish">Wishing you a day filled with happiness and a year filled with joy. Happy birthday!</div>
        <button id="next2" class="next-btn hidden">
            <div class="speech-bubble">plz click me one more time</div>
        </button>
    </div>

    <!-- Stage 4: Letter & Question -->
    <div id="letterStage" class="stage hidden">
        <div id="letter" class="letter">Open Me!</div>
        <div id="question" class="question hidden">
            <div>Do u like it?</div>
            <button class="yes-no-btn yes" onclick="yesClick()">Yes</button>
            <button class="yes-no-btn no" onclick="noClick()">No</button>
        </div>
        <div id="response" class="response hidden"></div>
    </div>

    <script>
        let correctBtnIndex = Math.floor(Math.random() * 10);

        // Stage 1: Create 10 random buttons
        function initButtons() {
            const stage = document.getElementById('buttonsStage');
            for (let i = 0; i < 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = 'click me';
                btn.style.left = Math.random() * 80 + 5 + '%';
                btn.style.top = Math.random() * 80 + 5 + '%';
                btn.onclick = () => {
                    if (i === correctBtnIndex) {
                        document.getElementById('buttonsStage').classList.add('hidden');
                        showBirthday();
                    } else {
                        btn.style.background = 'gray';
                        btn.textContent = 'fake!';
                    }
                };
                stage.appendChild(btn);
            }
        }

        // Stage 2: Show birthday after 5s
        function showBirthday() {
            document.getElementById('birthdayStage').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('next1').classList.remove('hidden');
            }, 5000);
        }

        // Next button 1
        document.getElementById('next1').onclick = () => {
            document.getElementById('birthdayStage').classList.add('hidden');
            document.getElementById('wishStage').classList.remove('hidden');
        };

        // Stage 3: Show wish, then letter button after 5s
        document.getElementById('next2').onclick = () => {
            document.getElementById('wishStage').classList.add('hidden');
            document.getElementById('letterStage').classList.remove('hidden');
        };

        // Letter click
        document.getElementById('letter').onclick = () => {
            document.getElementById('letter').classList.add('hidden');
            document.getElementById('question').classList.remove('hidden');
        };

        // Yes/No
        function yesClick() {
            document.getElementById('question').classList.add('hidden');
            document.getElementById('response').textContent = 'thank you madam ji';
            document.getElementById('response').classList.remove('hidden');
        }
        function noClick() {
            document.getElementById('question').classList.add('hidden');
            document.getElementById('response').innerHTML = "it's not working 😅";
            document.getElementById('response').classList.remove('hidden');
        }

        // Start
        initButtons();
    </script>
</body>
</html>
