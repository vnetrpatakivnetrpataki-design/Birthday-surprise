<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sravya!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff69b4, #ff1493, #ffc0cb, #ffb6c1);
            background-size: 400% 400%;
            animation: gradientShift 4s ease infinite;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hearts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart {
            position: absolute;
            color: #ff1493;
            font-size: 20px;
            animation: float 6s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .stage { position: relative; height: 100vh; z-index: 2; }
        .click-me-btn {
            position: absolute;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,105,180,0.5);
            animation: pulse 2s infinite;
            transition: transform 0.2s;
        }
        .click-me-btn:hover { transform: scale(1.1); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,105,180,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255,105,180,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,105,180,0); }
        }
        .happy-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            text-align: center;
            animation: glow 3s ease-in-out infinite alternate;
            font-weight: bold;
            z-index: 10;
            display: none;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #fff, 0 0 30px #ff1493, 0 0 40px #ff1493; }
            to { text-shadow: 0 0 30px #fff, 0 0 40px #ff69b4, 0 0 50px #ff69b4; }
        }
        .flower { color: #ffd700; font-size: 0.6em; animation: wiggle 1s infinite; }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        .next-btn {
            position: absolute;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,105,180,0.5);
            animation: bounce 2s infinite;
            display: none;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
        .speech-bubble {
            position: absolute;
            bottom: 70px; left: 50%;
            transform: translateX(-50%);
            background: #ffc0cb;
            color: #ff1493;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255,192,203,0.5);
            display: none;
            animation: floatBubble 2s ease-in-out infinite;
        }
        @keyframes floatBubble {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        .wish-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            text-align: center;
            animation: celebrate 1s ease-in-out infinite;
            font-weight: bold;
            display: none;
            z-index: 10;
        }
        @keyframes celebrate {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }
        .letter {
            position: absolute;
            top: -100px; left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #ff1493;
            padding: 20px;
            font-size: 24px;
            border: 3px dashed #ff69b4;
            border-radius: 10px;
            cursor: pointer;
            animation: flyIn 3s ease-out forwards;
            display: none;
            z-index: 15;
        }
        @keyframes flyIn {
            to { top: 40%; }
        }
        .quiz {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 20;
        }
        .quiz button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .yes-btn { background: #4caf50; color: white; }
        .no-btn { 
            background: #f44336; color: white; 
            position: absolute;
            animation: evade 0.5s infinite alternate;
        }
        @keyframes evade {
            0% { transform: translate(0,0); }
            100% { transform: translate(20px, 20px); }
        }
        .response {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            font-weight: bold;
            color: #ff1493;
            display: none;
            z-index: 20;
        }
        audio { display: none; }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="stage" id="stage">
        <!-- Initial buttons stage -->
        <div id="buttonsStage"></div>
        
        <!-- Happy Birthday text with flowers -->
        <div class="happy-text" id="happyText">
            <span class="flower">🌸</span> Happy Birthday Sravya <span class="flower">🌺</span><br>
            <span class="flower">🌼</span> Happy Birthday Sravya <span class="flower">🌸</span>
        </div>
        
        <!-- First next button -->
        <button class="next-btn" id="nextBtn1">Click Me!</button>
        <div class="speech-bubble" id="bubble1">Plz click me</div>
        
        <!-- Wish text -->
        <div class="wish-text" id="wishText">
            Wishing you a day filled with happiness and a year filled with joy. Happy birthday!
        </div>
        
        <!-- Second next button -->
        <button class="next-btn" id="nextBtn2">Click Me!</button>
        <div class="speech-bubble" id="bubble2">Plz click me one more time</div>
        
        <!-- Flying letter -->
        <div class="letter" id="letter">Click to open!</div>
        
        <!-- Quiz -->
        <div class="quiz" id="quiz">
            <h2>Do u like it?</h2>
            <button class="yes-btn" onclick="handleYes()">Yes</button>
            <button class="no-btn" id="noBtn" onclick="handleNo()">No</button>
        </div>
        
        <!-- Responses -->
        <div class="response" id="thankYou">Thank you madam ji! 🎉</div>
        <div class="response" id="notWorking">It's not working 😅</div>
    </div>
    
    <!-- Background music (upbeat dance track similar to Dance Monkey vibe) -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav"> <!-- Placeholder; replace with actual upbeat MP3 URL for full song effect -->
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        audio.play().catch(() => {}); // Autoplay with fallback

        // Create floating hearts
        function createHearts() {
            const hearts = document.getElementById('hearts');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '💖';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                hearts.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 300);
        }
        createHearts();

        // Stage 1: 10 random "Click Me" buttons, only one works
        function createButtons() {
            const stage = document.getElementById('buttonsStage');
            const correctIndex = Math.floor(Math.random() * 10);
            for (let i = 0; i < 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'click-me-btn';
                btn.textContent = 'Click Me';
                btn.style.left = Math.random() * 80 + 10 + '%';
                btn.style.top = Math.random() * 80 + 10 + '%';
                btn.onclick = () => {
                    if (i === correctIndex) {
                        stage.style.display = 'none';
                        document.getElementById('happyText').style.display = 'block';
                        setTimeout(() => {
                            document.getElementById('nextBtn1').style.display = 'block';
                            document.getElementById('bubble1').style.display = 'block';
                        }, 5000);
                    }
                };
                stage.appendChild(btn);
            }
        }
        createButtons();

        // Next button 1
        document.getElementById('nextBtn1').onclick = () => {
            document.getElementById('happyText').style.display = 'none';
            document.getElementById('nextBtn1').style.display = 'none';
            document.getElementById('bubble1').style.display = 'none';
            document.getElementById('wishText').style.display = 'block';
            setTimeout(() => {
                document.getElementById('nextBtn2').style.display = 'block';
                document.getElementById('bubble2').style.display = 'block';
            }, 5000);
        };

        // Next button 2
        document.getElementById('nextBtn2').onclick = () => {
            document.getElementById('wishText').style.display = 'none';
            document.getElementById('nextBtn2').style.display = 'none';
            document.getElementById('bubble2').style.display = 'none';
            document.getElementById('letter').style.display = 'block';
        };

        // Letter click
        document.getElementById('letter').onclick = () => {
            document.getElementById('letter').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            // Make No button evasive within screen
            const noBtn = document.getElementById('noBtn');
            let dx = 20, dy = 20;
            setInterval(() => {
                const rect = noBtn.getBoundingClientRect();
                const newLeft = parseInt(noBtn.style.left || '0') + dx;
                const newTop = parseInt(noBtn.style.top || '0') + dy;
                if (newLeft < 10 || newLeft > window.innerWidth - 100) dx = -dx;
                if (newTop < 10 || newTop > window.innerHeight - 100) dy = -dy;
                noBtn.style.left = (parseInt(noBtn.style.left || '50%') + dx) + 'px';
                noBtn.style.top = (parseInt(noBtn.style.top || '50%') + dy) + 'px';
                noBtn.style.position = 'fixed';
            }, 200);
        };

        function handleYes() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('thankYou').style.display = 'block';
        }

        function handleNo() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('notWorking').style.display = 'block';
        }
    </script>
</body>
</html>
