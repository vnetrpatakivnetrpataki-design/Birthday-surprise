<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
}

/* HEART ANIMATION BACKGROUND */
.heart {
  position:absolute;
  color:red;
  animation: float 5s linear infinite;
}
@keyframes float {
  0% {transform:translateY(100vh);}
  100% {transform:translateY(-10vh);}
}

/* MAIN CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* BUTTON STYLE */
.main-btn {
  padding:20px 40px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg, pink, red);
  color:white;
  cursor:pointer;
  animation: wave 2s infinite;
}

@keyframes wave {
  0% {box-shadow:0 0 10px pink;}
  50% {box-shadow:0 0 30px red;}
  100% {box-shadow:0 0 10px pink;}
}

/* CAT */
.cat {
  font-size:60px;
}

/* NERVOUS BUTTON */
.nervous {
  position:absolute;
  right:-200px;
  top:50%;
  transform:translateY(-50%);
  animation: slideIn 2s forwards;
}

@keyframes slideIn {
  to {right:50%; transform:translate(50%,-50%);}
}

/* SPEECH */
.speech {
  position:absolute;
  top:-50px;
  left:-120px;
  background:white;
  border-radius:10px;
  padding:10px;
}

/* BOXES */
.box {
  display:inline-block;
  padding:20px;
  margin:10px;
  background:white;
  border:2px solid pink;
  cursor:pointer;
}

/* DRAG WORDS */
.word {
  position:absolute;
  padding:10px 20px;
  background:white;
  border:2px solid pink;
  color:pink;
  cursor:grab;
}

#dropzone {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:60px;
  border:2px dashed white;
}

/* FINAL */
.final {
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
}
</style>

</head>

<body>

<div id="hearts"></div>

<div id="app" class="center">
  <div class="cat">🐱</div>
  <button class="main-btn" onclick="start()">can u touch me</button>
</div>

<script>

/* HEART BACKGROUND */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=Math.random()*20+10+"px";
  document.getElementById("hearts").appendChild(h);
  setTimeout(()=>h.remove(),5000);
},300);

/* START */
function start(){
  document.getElementById("app").innerHTML="";
  
  let btn=document.createElement("div");
  btn.className="main-btn nervous";
  btn.innerHTML="👀";
  btn.onclick=explode;

  let speech=document.createElement("div");
  speech.className="speech";
  speech.innerText="oiii I want to tell u something";

  btn.appendChild(speech);
  document.body.appendChild(btn);
}

/* EXPLODE */
function explode(){
  document.body.innerHTML="";
  nextBoxes();
}

/* BOXES */
function nextBoxes(){
  let container=document.createElement("div");
  container.className="center";

  let texts=[
    "I want to tell u something",
    "I'm really really serious ok na",
    "ok I'm ready to tell u......"
  ];

  let index=0;

  function showButtons(){
    container.innerHTML="";
    for(let i=index;i<texts.length;i++){
      let b=document.createElement("div");
      b.className="box";
      b.onclick=()=>{
        b.remove();
        let msg=document.createElement("div");
        msg.innerText=texts[i];
        container.appendChild(msg);
        setTimeout(()=>{
          msg.remove();
          index++;
          if(index==texts.length){
            dragGame();
          }else{
            showButtons();
          }
        },5000);
      };
      container.appendChild(b);
    }
  }

  document.body.appendChild(container);
  showButtons();
}

/* DRAG GAME */
function dragGame(){
  document.body.innerHTML="";

  let title=document.createElement("div");
  title.className="center";
  title.innerText="guess or make a sentence";
  document.body.appendChild(title);

  let words=["I","love","you","ji"];
  let drop=document.createElement("div");
  drop.id="dropzone";
  document.body.appendChild(drop);

  words.forEach(w=>{
    let el=document.createElement("div");
    el.className="word";
    el.innerText=w;
    el.style.left=Math.random()*80+"vw";
    el.style.top=Math.random()*80+"vh";

    el.draggable=true;

    el.ondragstart=(e)=>{
      e.dataTransfer.setData("text", w);
      e.dataTransfer.setData("id", el);
    };

    document.body.appendChild(el);
  });

  drop.ondragover=e=>e.preventDefault();

  let placed=0;

  drop.ondrop=e=>{
    e.preventDefault();
    placed++;
    if(placed==4){
      finalScene();
    }
  };
}

/* FINAL */
function finalScene(){
  document.body.innerHTML="";

  let div=document.createElement("div");
  div.className="final";

  div.innerHTML=`
  <h1>yes, I love u too madam 💖</h1>
  <p>plz bless me to be with u 4eva</p>
  <h2>🐱 🤝 🐱</h2>
  <h3>thank u kulli for coming in my life</h3>
  `;

  document.body.appendChild(div);
}

</script>

</body>
</html>
